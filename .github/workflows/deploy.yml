name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject AUTH_TOKEN into index.html
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          if [ -z "$AUTH_TOKEN" ]; then
            echo "::error::AUTH_TOKEN secret is not set"
            exit 1
          fi
          python3 -c "
          import os, pathlib
          p = pathlib.Path('index.html')
          p.write_text(p.read_text().replace('__AUTH_TOKEN__', os.environ['AUTH_TOKEN']))
          "

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
